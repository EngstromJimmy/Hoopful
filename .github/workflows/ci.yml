name: CI

# Quality gate: builds and runs the full test-suite on all three OSes.
# The tests include the golden-vector suite that verifies HUS/VIP decompression
# byte-for-byte against the original ArchiveLib implementation's output.
# (Deployment to GitHub Pages is a separate workflow: deploy-pages.yml.)

on:
  push:
    branches: [main]
  pull_request:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Hoopful.sln

      - name: Check formatting
        run: dotnet format Hoopful.sln --verify-no-changes --no-restore

      - name: Build (Release)
        run: dotnet build Hoopful.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Hoopful.sln --configuration Release --no-build --logger "console;verbosity=normal"
