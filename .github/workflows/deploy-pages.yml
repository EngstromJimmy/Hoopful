name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deployments at once; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Hoopful.Browser
        run: >
          dotnet publish samples/Hoopful.Browser/Hoopful.Browser.csproj
          --configuration Release --output publish

      - name: Rewrite <base href> for project pages
        # A project site is served from https://<user>.github.io/<repo>/, so the
        # app's base href must match the repo name. User/organization sites
        # (<user>.github.io repos) stay at "/".
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [[ "$REPO_NAME" != *.github.io ]]; then
            sed -i "s|<base href=\"/\" />|<base href=\"/$REPO_NAME/\" />|" publish/wwwroot/index.html
          fi

      - name: Add SPA fallback and .nojekyll
        # 404.html lets hard refreshes on any route load the app; .nojekyll stops
        # GitHub Pages from dropping the _framework folder (Jekyll ignores _*).
        run: |
          cp publish/wwwroot/index.html publish/wwwroot/404.html
          touch publish/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
